<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100 overflow-x-hidden relative">
    <div class="container mx-auto py-6 z-10">
      <header class="text-2xl font-semibold text-center mb-4">
        TO DO LIST
      </header>

      <main class="flex justify-center">
        <div class="shadow-md bg-white w-[50%] p-4 rounded-lg">
          <form id="todoForm" class="flex gap-2">
            <input
              type="text"
              id="listTitle"
              placeholder="Add a task..."
              class="flex-1 p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              required
            />

            <button
              type="submit"
              class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-md"
            >
              Add
            </button>
          </form>

          <div id="showList" class="m-2 mt-6 flex flex-col gap-2">
            
          </div>

        </div>
      </main>
    </div>

    <!-- modal box---------------- -->
    <div id="modalbox"
      class="h-[100vh] w-[100vw] bg-gray-500/50 z-0 absolute top-0 left-0  justify-center items-center hidden"
    >    
      <div  class="w-[50%] h-auto bg-white rounded-lg p-4 relative">
       <div id="closemodel" class="absolute p-1 rounded-full bg-red-600 top-[-10px] right-[-10px]">
         <svg
                class=" cursor-pointer transition-all duration-200 hover:scale-125 text-white fill-current"
                xmlns="http://www.w3.org/2000/svg"
                height="18px"
                viewBox="0 -960 960 960"
                width="18px"
                fill="#000000"
              >
                <path
                  d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"
                />
              </svg>
       </div>
        <div class="flex flex-col gap-3">
          <input
            type="text"
            id="listTitleUpdate"
            name="title"
            placeholder="Task title..."
            class="p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />

          <textarea
            id="listDescription"
            name="description"
            placeholder="Task description..."
            rows="12"
            class="p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          ></textarea>

          <button
            id="todoFormAddButton"
            class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-md cursor-pointer"
          >
            Add
          </button>
          <button
            id="todoFormUpdateButton"
            class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-md hidden cursor-pointer"
          >
           Update Data
          </button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
